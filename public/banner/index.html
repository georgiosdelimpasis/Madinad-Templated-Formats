<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

  html, body {
    width: 300px;
    height: 600px;
    overflow: hidden;
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    clip-path: inset(0);
  }

  body {
    position: relative;
    background: #ffffff;
  }

  .bg-scene {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 260px; height: 580px;
    border-radius: 20px;
    z-index: 0;
    overflow: hidden; pointer-events: none;
    background: none;
  }
  .bg-scene::before {
    content: '';
    position: absolute; inset: 0; z-index: 4;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
  }
  .bg-scene::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.35);
    z-index: 1;
  }

  /* Timer bar */
  /* Floating particles */
  .particle {
    position: absolute;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    animation: float-particle linear infinite;
  }
  @keyframes float-particle {
    0%   { transform: translateY(620px) rotate(0deg);   opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 0.5; }
    100% { transform: translateY(-40px) rotate(360deg); opacity: 0; }
  }
  .bg-layer {
    position: absolute; inset: 0;
    transition: opacity 1.2s ease-in-out;
    z-index: 0;
    background-size: cover;
    background-position: center;
    filter: blur(4px);
    transform: scale(1.12);
  }


  .phone {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    width: 260px;
    height: 580px;
    background: transparent;
    padding: 18px 22px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: visible;
  }

  .logo-row { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; gap: 14px; }
  .logo-svg { width: var(--logo-width, 120px); height: auto; }
  .logo-tagline {
    font-size: 22px; font-weight: 800;
    line-height: 1.12; letter-spacing: -0.2px;
    color: rgb(255, 255, 255);
    text-align: center;
  }

  .nav { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .nav span {
    color: #b8d8c8; font-size: 8px; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 500; cursor: pointer;
  }
  .nav-line { width: 30px; height: 1.5px; background: rgba(180,216,200,0.35); }

  .carousel-scene {
    width: 180px;
    height: 150px;
    position: relative;
    margin-bottom: 40px;
    perspective: 500px;
    perspective-origin: 50% 50%;
    overflow: visible;
    cursor: grab;
  }
  .carousel-scene:hover { z-index: 100; }
  .carousel-scene.dragging { cursor: grabbing; user-select: none; }

  .carousel-axle {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .carousel-drum {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .slide {
    position: absolute;
    width: 130px;
    height: 90px;
    left: 50%;
    top: 50%;
    z-index: 1000;
    margin-left: -60px;
    margin-top: -39px;
    border-radius: 10px;
    overflow: hidden;
    backface-visibility: visible;
    box-shadow: 0 5px 20px rgba(0,0,0,0.7);
    will-change: filter;
    transition: box-shadow 0.35s ease, transform 0.4s ease;
  }
  .slide.active {
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
  }
  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 25%, rgba(255,255,255,0.4) 50%, transparent 75%);
    transform: translateX(-150%);
    pointer-events: none;
    z-index: 2;
  }
  @keyframes slide-shine {
    from { transform: translateX(-150%); }
    to   { transform: translateX(250%); }
  }
  .slide.slide-shine::after { animation: slide-shine 1.2s ease-out; }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }

  .slide:nth-child(1) { transform: rotateY(0deg)   translateZ(115px); }
  .slide:nth-child(2) { transform: rotateY(60deg)  translateZ(115px); }
  .slide:nth-child(3) { transform: rotateY(120deg) translateZ(115px); }
  .slide:nth-child(4) { transform: rotateY(180deg) translateZ(115px); }
  .slide:nth-child(5) { transform: rotateY(240deg) translateZ(115px); }
  .slide:nth-child(6) { transform: rotateY(300deg) translateZ(115px); }

  .carousel-scene:hover .slide.active:nth-child(1) { transform: rotateY(0deg)   translateZ(150px) scale(1.22); box-shadow: none; }
  .carousel-scene:hover .slide.active:nth-child(2) { transform: rotateY(60deg)  translateZ(150px) scale(1.22); box-shadow: none; }
  .carousel-scene:hover .slide.active:nth-child(3) { transform: rotateY(120deg) translateZ(150px) scale(1.22); box-shadow: none; }
  .carousel-scene:hover .slide.active:nth-child(4) { transform: rotateY(180deg) translateZ(150px) scale(1.22); box-shadow: none; }
  .carousel-scene:hover .slide.active:nth-child(5) { transform: rotateY(240deg) translateZ(150px) scale(1.22); box-shadow: none; }
  .carousel-scene:hover .slide.active:nth-child(6) { transform: rotateY(300deg) translateZ(150px) scale(1.22); box-shadow: none; }

  .carousel-scene:hover .slide:not(.active):nth-child(1) { transform: rotateY(0deg)   translateZ(115px) scale(0.88); }
  .carousel-scene:hover .slide:not(.active):nth-child(2) { transform: rotateY(60deg)  translateZ(115px) scale(0.88); }
  .carousel-scene:hover .slide:not(.active):nth-child(3) { transform: rotateY(120deg) translateZ(115px) scale(0.88); }
  .carousel-scene:hover .slide:not(.active):nth-child(4) { transform: rotateY(180deg) translateZ(115px) scale(0.88); }
  .carousel-scene:hover .slide:not(.active):nth-child(5) { transform: rotateY(240deg) translateZ(115px) scale(0.88); }
  .carousel-scene:hover .slide:not(.active):nth-child(6) { transform: rotateY(300deg) translateZ(115px) scale(0.88); }

  .content { width: 100%; text-align: left; padding: 0 2px; }
  .label {
    color: rgba(255,255,255,0.45); font-size: 10px;
    letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; font-weight: 400; text-align: center;
  }
  .headline {
    color: #fff; font-size: 20px; font-weight: 800;
    line-height: 1.12; letter-spacing: -0.3px;  text-align: center;
  }
  @keyframes text-exit-up   { to { opacity:0; transform:translateY(-10px); } }
  @keyframes text-exit-down { to { opacity:0; transform:translateY(10px);  } }
  @keyframes label-enter    { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes headline-enter { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }

  .label.exit    { animation: text-exit-up   0.15s ease-in forwards; }
  .headline.exit { animation: text-exit-down 0.15s ease-in forwards; }
  .label.enter    { animation: label-enter    0.45s cubic-bezier(0.22,1,0.36,1) both; }
  .headline.enter { animation: headline-enter 0.55s cubic-bezier(0.22,1,0.36,1) 0.06s both; }

  .button {
    position: relative;
    margin-top: auto;
    transition: all 0.3s ease-in-out;
    box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
    padding-block: 0.5rem;
    padding-inline: 1.25rem;
    background-color: #ee1d25;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    gap: 10px;
    font-weight: bold;
    border: 3px solid #ffffff4d;
    outline: none;
    overflow: hidden;
    font-size: 15px;
    cursor: pointer;
  }
  .button .icon {
    width: 24px; height: 24px;
    transition: all 0.3s ease-in-out;
  }
  .button:hover { transform: scale(1.05); border-color: #fff9; }
  .button:hover .icon { transform: translate(4px); }
  .button:hover::before { animation: shine 1.5s ease-out infinite; }
  @keyframes snap-pulse {
    0%   { transform: scale(1);    border-color: #ffffff4d; }
    25%  { transform: scale(1.07); border-color: #fff9; }
    65%  { transform: scale(1.07); border-color: #fff9; }
    100% { transform: scale(1);    border-color: #ffffff4d; }
  }
  @keyframes snap-icon {
    0%   { transform: translate(0); }
    25%  { transform: translate(5px); }
    65%  { transform: translate(5px); }
    100% { transform: translate(0); }
  }
  .button.snap-animate { animation: snap-pulse 1.2s ease-out; }
  .button.snap-animate .icon { animation: snap-icon 1.2s ease-out; }
  .button.snap-animate::before { animation: shine 1.2s ease-out; }
  .button::before {
    content: "";
    position: absolute;
    width: 100px; height: 100%;
    background-image: linear-gradient(120deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.8), rgba(255,255,255,0) 70%);
    top: 0; left: -100px; opacity: 0.6;
  }
  @keyframes shine {
    0%  { left: -100px; }
    60% { left: 100%; }
    to  { left: 100%; }
  }
  @keyframes skeleton-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .slide-skeleton {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
    background-size: 200% 100%;
    animation: skeleton-shimmer 1.5s infinite;
  }
  .bg-skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%) !important;
    background-size: 200% 100% !important;
    animation: skeleton-shimmer 1.5s infinite;
  }
</style>
</head>
<body>

<div class="bg-scene">
  <div class="bg-layer bg-skeleton" style="opacity:1;"></div>
  <div class="bg-layer" style="opacity:0;"></div>
  <!-- Timer bar -->
  <div class="mountain mountain-left"></div>
  <div class="mountain mountain-right"></div>
  <div class="fog"></div>
</div>

<div class="phone">
  <div class="logo-row">
    <div class="logo-svg" style="display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);border:1.5px dashed rgba(255,255,255,0.35);border-radius:8px;height:40px;padding:0 16px;">
      <span style="color:rgba(255,255,255,0.55);font-size:12px;font-weight:600;letter-spacing:0.04em;white-space:nowrap;">Your Logo</span>
    </div>
    <span class="logo-tagline">Your campaign slogan goes here</span>
  </div>

<div class="carousel-scene">
    <div class="carousel-axle">
    <div class="carousel-drum">
      <div class="slide"><div class="slide-skeleton" data-slot="1"></div></div>
      <div class="slide"><div class="slide-skeleton" data-slot="2"></div></div>
      <div class="slide"><div class="slide-skeleton" data-slot="3"></div></div>
      <div class="slide"><div class="slide-skeleton" data-slot="4"></div></div>
      <div class="slide"><div class="slide-skeleton" data-slot="5"></div></div>
      <div class="slide"><div class="slide-skeleton" data-slot="6"></div></div>
    </div>
    </div>
  </div>

  <div class="content">
    <p class="label"></p>
    <h1 class="headline"></h1>
  </div>

  <button class="button">
    Δείτε περισσότερα
    <svg class="icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
      <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm4.28 10.28a.75.75 0 000-1.06l-3-3a.75.75 0 10-1.06 1.06l1.72 1.72H8.25a.75.75 0 000 1.5h5.69l-1.72 1.72a.75.75 0 101.06 1.06l3-3z" clip-rule="evenodd"></path>
    </svg>
  </button>
</div>

<script>
(function() {
  const scene  = document.querySelector('.carousel-scene');
  const drum   = document.querySelector('.carousel-drum');
  const axle   = document.querySelector('.carousel-axle');
  const slides = document.querySelectorAll('.slide');
  const N      = slides.length;

  const SNAP_MS = 650;
  const HOLD_MS = 1500;
  const DRAG_SENSITIVITY = 0.45; // deg per px

  const POSES = [
    { z:  0, x:  0, label: 'LABEL TEXT', headline: '', url: '' },
    { z: 18, x: -5, label: 'LABEL TEXT', headline: '', url: '' },
    { z:-10, x:  8, label: 'LABEL TEXT', headline: '', url: '' },
    { z: 22, x: -3, label: 'LABEL TEXT', headline: '', url: '' },
    { z:-15, x: -6, label: 'LABEL TEXT', headline: '', url: '' },
    { z:  5, x: 14, label: 'LABEL TEXT', headline: '', url: '' },
  ];

  const bgLayers = document.querySelectorAll('.bg-layer');
  let activeBgIdx = 0;

  const contentEl  = document.querySelector('.content');
  const labelEl    = contentEl.querySelector('.label');
  const headlineEl = contentEl.querySelector('.headline');

  const btnEl      = document.querySelector('.button');

  function updateContent(idx) {
    const next = 1 - activeBgIdx;
    bgLayers[next].style.backgroundImage = `url(${idx + 1}.webp)`;
    bgLayers[next].style.opacity = '1';
    bgLayers[activeBgIdx].style.opacity = '0';
    activeBgIdx = next;
    labelEl.classList.remove('enter'); headlineEl.classList.remove('enter');
    labelEl.classList.add('exit');    headlineEl.classList.add('exit');
    setTimeout(() => {
      labelEl.textContent  = POSES[idx].label;
      headlineEl.innerHTML = POSES[idx].headline;
      labelEl.classList.remove('exit');   headlineEl.classList.remove('exit');
      void labelEl.offsetWidth;
      labelEl.classList.add('enter');     headlineEl.classList.add('enter');
    }, 150);
    btnEl.onclick = bodyClick;
    btnEl.classList.remove('snap-animate');
    void btnEl.offsetWidth;
    btnEl.classList.add('snap-animate');
    const s = slides[idx];
    s.classList.remove('slide-shine');
    void s.offsetWidth;
    s.classList.add('slide-shine');
  }

  function ease(t) { return 1 - Math.pow(1 - t, 3); }

  function bodyClick() {
    window.open(POSES[curIdx].url, "_blank");
  }

  // Populate first slide content immediately
  labelEl.textContent  = POSES[0].label;
  headlineEl.innerHTML = POSES[0].headline;
  labelEl.classList.add('enter');
  headlineEl.classList.add('enter');
  btnEl.onclick = bodyClick;

  // Auto-cycle state
  let curIdx = 0, nextIdx = 1;
  let fromZ = POSES[0].z, fromX = POSES[0].x, fromAngle = 0;
  let toZ = POSES[1].z, toX = POSES[1].x;
  const d0 = ((-(360/N)) % 360 + 540) % 360 - 180;
  let toAngle = d0;
  let cycleStart = null;
  let needsWrite = true;
  let contentFired = false;

  // Drag state
  let mode = 'auto'; // 'auto' | 'drag' | 'snapback'
  let paused = false;
  let prevNow = null;
  let currentAngle = 0;
  let currentAxleZ = POSES[0].z, currentAxleX = POSES[0].x;
  let dragStartX = 0, dragBaseAngle = 0;
  let snapFromAngle = 0, snapToAngle = 0, snapStart = null;
  let snapFromAxleZ = 0, snapFromAxleX = 0;
  let snapAxleZ = 0, snapAxleX = 0;

  function applyTransforms(axleZ, axleX, drumAngle) {
    currentAngle  = drumAngle;
    currentAxleZ  = axleZ;
    currentAxleX  = axleX;
    axle.style.transform = `rotateZ(${axleZ}deg) rotateX(${axleX}deg)`;
    drum.style.transform = `rotateY(${drumAngle}deg)`;
    const yRad = drumAngle * Math.PI / 180;
    for (let i = 0; i < N; i++) {
      const f = (Math.cos(yRad + (i / N) * Math.PI * 2) + 1) / 2;
      slides[i].style.filter = 'brightness(' + (0.35 + f * f * 0.65) + ')';
      slides[i].classList.toggle('active', f > 0.9);
    }
  }

  // ── Drag handlers ────────────────────────────────────
  function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

  scene.addEventListener('mousedown',  onDragStart);
  scene.addEventListener('touchstart', onDragStart, { passive: true });
  window.addEventListener('mousemove',  onDragMove);
  window.addEventListener('touchmove',  onDragMove, { passive: true });
  window.addEventListener('mouseup',   onDragEnd);
  window.addEventListener('touchend',  onDragEnd);

  let liveX = 0; // updated by mousemove, read by rAF
  let dragVelocity = 0, prevDragX = 0, prevDragTime = 0;

  function onDragStart(e) {
    mode = 'drag';
    dragStartX    = getX(e);
    liveX         = dragStartX;
    prevDragX     = dragStartX;
    prevDragTime  = performance.now();
    dragVelocity  = 0;
    dragBaseAngle = currentAngle;
    scene.classList.add('dragging');
  }

  function onDragMove(e) {
    if (mode !== 'drag') return;
    const now  = performance.now();
    const newX = getX(e);
    const dt   = now - prevDragTime;
    if (dt > 0 && dt < 50) dragVelocity = (newX - liveX) / dt;
    liveX        = newX;
    prevDragTime = now;
  }

  const VELOCITY_THRESHOLD = 0.4; // px/ms

  function onDragEnd() {
    if (mode !== 'drag') return;
    scene.classList.remove('dragging');

    // Velocity or nearest snap
    const nearest = Math.round(-currentAngle / (360 / N));
    let target = nearest;
    if (dragVelocity < -VELOCITY_THRESHOLD) target = nearest + 1;
    if (dragVelocity >  VELOCITY_THRESHOLD) target = nearest - 1;
    dragVelocity = 0;

    const snapIdx  = ((target % N) + N) % N;
    const ideal    = -(target * (360 / N));
    const d        = ((ideal - currentAngle) % 360 + 540) % 360 - 180;

    snapFromAngle  = currentAngle;
    snapToAngle    = currentAngle + d;
    snapFromAxleZ  = currentAxleZ;
    snapFromAxleX  = currentAxleX;
    snapAxleZ      = POSES[snapIdx].z;
    snapAxleX      = POSES[snapIdx].x;
    snapStart      = null;

    // Resume auto-cycle from snapped slide
    curIdx    = snapIdx;
    nextIdx   = (curIdx + 1) % N;

    mode = 'snapback';
  }

  // ── rAF loop ─────────────────────────────────────────
  function update(now) {
    if (mode === 'drag') {
      const angle = dragBaseAngle + (liveX - dragStartX) * DRAG_SENSITIVITY;
      applyTransforms(currentAxleZ, currentAxleX, angle);
    } else if (mode === 'snapback') {
      if (snapStart === null) { snapStart = now; updateContent(curIdx); }
      const t     = ease(Math.min((now - snapStart) / SNAP_MS, 1));
      const angle = snapFromAngle + (snapToAngle - snapFromAngle) * t;
      applyTransforms(
        snapFromAxleZ + (snapAxleZ - snapFromAxleZ) * t,
        snapFromAxleX + (snapAxleX - snapFromAxleX) * t,
        angle
      );
      if (now - snapStart >= SNAP_MS) {
        applyTransforms(snapAxleZ, snapAxleX, snapToAngle);
        fromAngle  = snapToAngle;
        fromZ      = POSES[curIdx].z;
        fromX      = POSES[curIdx].x;
        toZ        = POSES[nextIdx].z;
        toX        = POSES[nextIdx].x;
        const ideal = -(nextIdx * (360 / N));
        const d     = ((ideal - fromAngle) % 360 + 540) % 360 - 180;
        toAngle    = fromAngle + d;
        cycleStart = now;
        needsWrite = false;
        mode       = 'auto';
      }
    } else {
      // auto mode
      if (cycleStart === null) cycleStart = now;
      if (paused && prevNow !== null) cycleStart += now - prevNow;
      const elapsed = now - cycleStart;

      if (elapsed >= HOLD_MS + SNAP_MS) {
        applyTransforms(toZ, toX, toAngle);
        curIdx    = nextIdx;
        nextIdx   = (nextIdx + 1) % N;
        fromZ     = POSES[curIdx].z;
        fromX     = POSES[curIdx].x;
        fromAngle = toAngle;
        toZ       = POSES[nextIdx].z;
        toX       = POSES[nextIdx].x;
        const ideal = -(nextIdx * (360 / N));
        const d     = ((ideal - fromAngle) % 360 + 540) % 360 - 180;
        toAngle    = fromAngle + d;
        cycleStart = now;
        needsWrite = false;
        contentFired = false;
      } else if (elapsed >= HOLD_MS) {
        if (!contentFired) {
          updateContent(nextIdx);
          contentFired = true;
        }
        const t = ease(Math.min((elapsed - HOLD_MS) / SNAP_MS, 1));
        applyTransforms(
          fromZ + (toZ - fromZ) * t,
          fromX + (toX - fromX) * t,
          fromAngle + (toAngle - fromAngle) * t
        );
        needsWrite = true;
      } else if (needsWrite) {
        applyTransforms(fromZ, fromX, fromAngle);
        needsWrite = false;
        contentFired = false;
      }
    }

    prevNow = now;
    requestAnimationFrame(update);
  }

  scene.addEventListener('mouseenter', () => { paused = true; });
  scene.addEventListener('mouseleave', () => { paused = false; prevNow = null; });

  requestAnimationFrame(update);
})();
</script>
</body>
</html>
